name: Coverage check

# Monthly: rebuild the index and compare against what AFIP publishes live.
# Opens an issue when new URLs appear on AFIP's index pages so we can add them
# to sources.json. The DB itself is not committed — it gets regenerated on publish.

on:
  schedule:
    - cron: '0 6 1 * *'  # 1st of every month at 06:00 UTC
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache HuggingFace embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-multilingual-e5-small-${{ runner.os }}

      - name: Cache crawled documents + embeddings
        uses: actions/cache@v4
        with:
          path: ingest/.cache
          key: ingest-cache-${{ hashFiles('ingest/sources.json') }}-${{ github.run_id }}
          restore-keys: |
            ingest-cache-${{ hashFiles('ingest/sources.json') }}-
            ingest-cache-

      - name: Install dependencies
        run: npm ci

      - name: Build index
        run: npm run ingest:build

      - name: Run coverage report
        id: coverage
        continue-on-error: true
        run: |
          npm run ingest:coverage | tee coverage.log
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Open issue if new AFIP docs detected
        if: steps.coverage.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('coverage.log', 'utf8');
            const missing = log.match(/=== MISSING[\s\S]*?=== /)?.[0] ?? '(could not extract)';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Coverage: new AFIP docs detected (${new Date().toISOString().slice(0, 10)})`,
              body: `The monthly coverage check found URLs on AFIP's site that are not indexed.\n\nReview the workflow output and update \`ingest/sources.json\` if any are legitimate new web services.\n\n\`\`\`\n${missing.slice(0, 8000)}\n\`\`\``,
              labels: ['coverage', 'automated'],
            });
